<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roox pedia - Daftar Akun</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        @keyframes pageIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            animation: pageIn 0.8s ease-out forwards;
        }
        .logo-big {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 3px solid #00acc1;
            box-shadow: 0 0 20px rgba(0, 172, 193, 0.4);
        }
        .form-card {
            background: rgba(0, 34, 45, 0.9);
            padding: 35px 25px;
            border-radius: 25px;
            border: 1px solid rgba(0, 172, 193, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        h2 { font-size: 28px; letter-spacing: 3px; color: #00acc1; margin-bottom: 5px; }
        .desc { font-size: 14px; color: #668899; margin-bottom: 30px; letter-spacing: 1px; }
        .input-box { text-align: left; margin-bottom: 20px; }
        .input-box label { display: block; font-size: 12px; color: #ff8800; font-weight: 700; margin-bottom: 8px; margin-left: 5px; letter-spacing: 1px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 10, 15, 0.5);
            border: 1px solid rgba(0, 172, 193, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #ff8800; box-shadow: 0 0 10px rgba(255, 136, 0, 0.2); }
        .btn-auth {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00acc1, #007c91);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 172, 193, 0.3); }
        .footer { margin-top: 30px; font-size: 14px; color: #668899; }
        .footer a { color: #ff8800; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.ibb.co.com/KzQVqvb8/IMG-20260423-WA0008.jpg" alt="Logo" class="logo-big">
        <div class="form-card">
            <h2>DAFTAR</h2>
            <p class="desc">Buat akun baru roox pedia</p>
            <form id="regisForm">
                <div class="input-box">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
                </div>
                <div class="input-box">
                    <label>Nomor WhatsApp</label>
                    <input type="number" id="nomorWa" placeholder="Contoh: 62818xxxx" required>
                </div>
                <div class="input-box">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="email@gmail.com" required>
                </div>
                <div class="input-box">
                    <label>Buat Password</label>
                    <input type="password" id="pw" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">DAFTAR SEKARANG</button>
            </form>
            <div class="footer">
                SUDAH PUNYA AKUN? <a href="login.html">LOGIN</a>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>

<script>
    function generateApiKey() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = 'DK-';
        for (let i = 0; i < 24; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    document.getElementById('regisForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nama = document.getElementById('nama').value;
        const nomorWa = document.getElementById('nomorWa').value;
        const email = document.getElementById('email').value;
        const pw = document.getElementById('pw').value;

        Swal.fire({
            title: 'Memproses...',
            didOpen: () => Swal.showLoading(),
            background: '#00222d',
            color: '#fff'
        });

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, pw);
            const user = userCredential.user;

            await db.ref('users/' + user.uid).set({
                nama: nama,
                nomorWa: nomorWa,
                email: email,
                saldo: 0,
                role: 'member',
                api_key: generateApiKey(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            Swal.fire({
                icon: 'success',
                title: 'Berhasil Daftar!',
                text: 'Selamat datang di roox pedia',
                background: '#00222d',
                color: '#fff'
            }).then(() => {
                window.location.href = 'dashboard.html';
            });

        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Gagal Daftar',
                text: error.message,
                background: '#00222d',
                color: '#fff'
            });
        }
    });
</script>
</body>
</html>
