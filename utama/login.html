<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia- Masuk Akun</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            text-transform: lowercase;
        }
        .container { 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            animation: pageIn 0.8s ease-out forwards;
        }
        .logo-big {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            border-radius: 25px;
            border: 2px solid #00acc1;
            box-shadow: 0 0 25px rgba(0, 172, 193, 0.4);
        }
        .form-card {
            background: rgba(0, 34, 45, 0.8); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(0, 172, 193, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }
        h2 { font-size: 32px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; }
        .desc { color: #00acc1; font-size: 14px; margin-bottom: 30px; text-transform: uppercase; font-weight: 700; }
        .input-box { margin-bottom: 20px; text-align: left; }
        .input-box label { 
            display: block; 
            font-size: 13px; 
            color: #ff8800; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            font-weight: 700;
        }
        input { 
            width: 100%; 
            padding: 15px 20px; 
            background: rgba(0, 26, 34, 0.8); 
            border: 1px solid rgba(0, 172, 193, 0.3); 
            border-radius: 15px; 
            color: #fff;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: #00acc1; background: #001a22; box-shadow: 0 0 15px rgba(0, 172, 193, 0.2); }
        .btn-auth { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, #00acc1, #007c91); 
            color: #fff; 
            border: none; 
            border-radius: 15px; 
            font-weight: 700; 
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 2px;
            transition: 0.4s;
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 172, 193, 0.3); }
        .footer { margin-top: 30px; font-size: 14px; color: #668899; }
        .footer a { color: #ff8800; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.ibb.co.com/KzQVqvb8/IMG-20260423-WA0008.jpg" alt="Logo" class="logo-big">
        <div class="form-card">
            <h2>LOGIN</h2>
            <p class="desc">masuk ke dashboard rooxpedia</p>
            <form id="loginForm">
                <div class="input-box">
                    <label>email address</label>
                    <input type="email" id="email" placeholder="email@gmail.com" required>
                </div>
                <div class="input-box">
                    <label>password</label>
                    <input type="password" id="pw" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">masuk sekarang</button>
            </form>
            <div class="footer">
                belum punya akun? <a href="regis.html">daftar</a>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC_5LQ6U3DtMf4STbDjLymazm8I_zySbSw",
        authDomain: "myproject-485415.firebaseapp.com",
        databaseURL: "https://myproject-485415-default-rtdb.firebaseio.com",
        projectId: "myproject-485415",
        storageBucket: "myproject-485415.firebasestorage.app",
        messagingSenderId: "450623193142",
        appId: "1:450623193142:web:d7a9caf66e1dff8d495897"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('pw').value;

        Swal.fire({
            title: 'mohon tunggu...',
            background: '#00222d',
            color: '#fff',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            if (email === "dikaadmin@gmail.com") {
                Swal.fire({
                    icon: 'success',
                    title: 'halo admin!',
                    text: 'mengarahkan ke dashboard admin...',
                    background: '#00222d',
                    color: '#fff',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'admin/dashboard.html';
                });
            } else {
                window.location.href = 'dashboard.html';
            }

        } catch (error) {
            let errorMsg = error.message;
            if (error.code === 'auth/wrong-password') errorMsg = "password salah bos";
            if (error.code === 'auth/user-not-found') errorMsg = "email tidak terdaftar";

            Swal.fire({
                icon: 'error',
                title: 'gagal masuk',
                text: errorMsg,
                background: '#00222d',
                color: '#fff'
            });
        }
    };
</script>
</body>
</html>
