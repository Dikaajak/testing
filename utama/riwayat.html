<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia 🚀 - riwayat</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff; min-height: 100vh; padding: 20px;
            text-transform: lowercase;
        }
        .header { display: flex; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(0, 172, 193, 0.2); }
        .header i { font-size: 20px; margin-right: 15px; cursor: pointer; color: #00acc1; }
        .header h3 { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 172, 193, 0.2);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: rgba(255,255,255,0.5);
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 13px;
            text-transform: uppercase;
        }
        .tab-btn.active {
            background: #00acc1;
            color: #fff;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .deposit-card {
            background: rgba(0, 34, 45, 0.8);
            border: 1px solid rgba(0, 172, 193, 0.3);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .depo-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 10px; }
        .method-name { font-weight: 700; color: #00ff88; text-transform: uppercase; }
        
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: rgba(255, 136, 0, 0.2); color: #ff8800; border: 1px solid #ff8800; }
        .status-success { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .status-canceled { background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; }
        .status-batal { background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; }

        .depo-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-box label { display: block; font-size: 10px; color: #00acc1; font-weight: 700; text-transform: uppercase; }
        .info-box p { font-size: 14px; font-weight: 700; margin-top: 2px; }

        .number-box {
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; margin: 10px 0;
            border: 1px dashed rgba(0, 172, 193, 0.5);
        }
        .number-box span { font-size: 18px; font-weight: 700; color: #00acc1; }
        
        .otp-box {
            background: linear-gradient(45deg, rgba(255, 136, 0, 0.1), transparent);
            padding: 10px; border-radius: 8px; text-align: center; border: 1px solid rgba(255, 136, 0, 0.2);
        }
        .otp-code { font-size: 24px; font-weight: 700; letter-spacing: 5px; color: #fff; }

        .btn-cancel {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }
        .btn-cancel:hover {
            background: #ff4444;
            color: #fff;
        }

        .empty-state { text-align: center; margin-top: 50px; opacity: 0.5; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.location.href='dashboard.html'"></i>
        <h3>pusat riwayat</h3>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('deposit', this)">riwayat deposit</button>
        <button class="tab-btn" onclick="openTab('nomor', this)">riwayat nomor</button>
    </div>

    <div id="deposit" class="content-section active">
        <div id="depositList">
            <div class="empty-state">sedang memuat kenangan lama...</div>
        </div>
    </div>

    <div id="nomor" class="content-section">
        <div id="orderList">
            <div class="empty-state">mencari jejak nomor...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_5LQ6U3DtMf4STbDjLymazm8I_zySbSw",
            authDomain: "myproject-485415.firebaseapp.com",
            databaseURL: "https://myproject-485415-default-rtdb.firebaseio.com",
            projectId: "myproject-485415",
            storageBucket: "myproject-485415.firebasestorage.app",
            messagingSenderId: "450623193142",
            appId: "1:450623193142:web:d7a9caf66e1dff8d495897"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function openTab(tabName, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            btn.classList.add('active');
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                loadDeposits(user.uid);
                loadOrders(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadDeposits(uid) {
            db.ref('deposits/' + uid).orderByChild('timestamp').on('value', snapshot => {
                const container = document.getElementById('depositList');
                container.innerHTML = '';
                if (!snapshot.exists()) {
                    container.innerHTML = '<div class="empty-state">belum ada deposit.</div>';
                    return;
                }
                let items = [];
                snapshot.forEach(child => { items.push({ key: child.key, ...child.val() }); });
                items.reverse().forEach(depo => renderDepositCard(depo));
            });
        }

        function loadOrders(uid) {
            db.ref('orders/' + uid).orderByChild('timestamp').on('value', snapshot => {
                const container = document.getElementById('orderList');
                container.innerHTML = '';
                if (!snapshot.exists()) {
                    container.innerHTML = '<div class="empty-state">belum ada nomor yang dibeli.</div>';
                    return;
                }
                let items = [];
                snapshot.forEach(child => { items.push({ key: child.key, ...child.val() }); });
                items.reverse().forEach(order => renderOrderCard(order));
            });
        }

        function renderDepositCard(depo) {
            const container = document.getElementById('depositList');
            const card = document.createElement('div');
            card.className = 'deposit-card';
            const status = (depo.status || '').toLowerCase();
            let statusBadge = `<span class="status-badge status-${status}">${status}</span>`;
            
            card.innerHTML = `
                <div class="depo-header">
                    <span class="method-name">${depo.metode || 'manual'}</span>
                    ${statusBadge}
                </div>
                <div class="depo-body">
                    <div class="info-box"><label>jumlah</label><p>rp ${parseInt(depo.jumlah || 0).toLocaleString()}</p></div>
                    <div class="info-box"><label>tanggal</label><p>${depo.tanggal || '-'}</p></div>
                </div>
            `;
            container.appendChild(card);
        }

        function renderOrderCard(order) {
            const container = document.getElementById('orderList');
            const card = document.createElement('div');
            card.className = 'deposit-card';
            
            let displayStatus = (order.status || 'pending').toLowerCase();
            if (order.otp && order.otp !== 'menunggu...') {
                displayStatus = 'success';
            }

            let cancelButton = '';
            if ((!order.otp || order.otp === 'menunggu...') && displayStatus === 'pending') {
                cancelButton = `<button class="btn-cancel" onclick="cancelOrder('${order.key}', ${order.harga})">batalkan pesanan</button>`;
            }
            
            card.innerHTML = `
                <div class="depo-header">
                    <span class="method-name" style="color:#ff8800">${order.aplikasi}</span>
                    <span class="status-badge status-${displayStatus}">${displayStatus}</span>
                </div>
                <div style="font-size:11px; margin-bottom:8px; opacity:0.6;">${order.negara} | ${order.operator} | rp ${order.harga}</div>
                <div class="number-box">
                    <span>${order.nomor}</span>
                    <button onclick="copyText('${order.nomor}')" style="background:#00acc1; border:none; color:#fff; padding:5px 10px; border-radius:5px; font-size:10px;">copy</button>
                </div>
                <div class="otp-box">
                    <label style="font-size:10px; color:#ff8800; font-weight:700; display:block; margin-bottom:5px;">kode otp</label>
                    <div class="otp-code">${order.otp || 'menunggu...'}</div>
                </div>
                ${cancelButton}
            `;
            container.appendChild(card);
        }

        async function cancelOrder(orderKey, harga) {
            const user = auth.currentUser;
            if (!user) return;

            const result = await Swal.fire({
                title: 'batalkan pesanan?',
                text: "saldo akan dikembalikan secara otomatis.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#00acc1',
                cancelButtonColor: '#ff4444',
                confirmButtonText: 'ya, batalkan!',
                background: '#00222d',
                color: '#fff'
            });

            if (result.isConfirmed) {
                try {
                    await db.ref(`orders/${user.uid}/${orderKey}`).update({
                        status: 'batal'
                    });

                    const userRef = db.ref(`users/${user.uid}`);
                    const snapshot = await userRef.once('value');
                    const currentSaldo = snapshot.val().saldo || 0;

                    await userRef.update({
                        saldo: currentSaldo + harga
                    });

                    Swal.fire({
                        title: 'berhasil',
                        text: 'pesanan dibatalkan & saldo dikembalikan.',
                        icon: 'success',
                        background: '#00222d',
                        color: '#fff'
                    });
                } catch (error) {
                    Swal.fire('error', error.message, 'error');
                }
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            Swal.fire({ title: 'copy berhasil', timer: 1000, showConfirmButton: false, background: '#00222d', color: '#fff' });
        }
    </script>
</body>
</html>
