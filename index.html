<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia - Provider Nokos Terbaik & Terpercaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc1 0%, #003344 100%);
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .hero { 
            background: rgba(0, 26, 34, 0.6); 
            padding: 60px 40px; 
            border-radius: 40px; 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 172, 193, 0.3);
            max-width: 800px; 
            width: 100%; 
            text-align: center;
            animation: fadeInUp 1s ease-out;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
            animation: float 4s ease-in-out infinite;
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 30px;
            border: 2px solid #00acc1;
            box-shadow: 0 0 30px rgba(0, 172, 193, 0.5);
        }

        h1 { 
            font-size: 52px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 6px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #00acc1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typing-text {
            font-size: 20px;
            color: #00acc1;
            height: 24px;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }

        .feature-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 172, 193, 0.1);
            transition: 0.3s;
        }

        .feature-item:hover {
            background: rgba(0, 172, 193, 0.1);
            transform: translateY(-5px);
        }

        .feature-item i {
            color: #ff8800;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .feature-item h3 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #fff;
        }

        .feature-item p {
            font-size: 13px;
            color: #aaa;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }

        .stat-box h4 {
            font-size: 24px;
            color: #ff8800;
        }

        .stat-box p {
            font-size: 12px;
            color: #00acc1;
            text-transform: uppercase;
            font-weight: 700;
        }

        .btn-group { 
            display: flex; 
            gap: 20px; 
            justify-content: center;
        }

        .btn { 
            flex: 1;
            padding: 18px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 700; 
            text-transform: uppercase; 
            transition: 0.4s; 
            font-size: 16px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login { 
            background: rgba(0, 172, 193, 0.1); 
            color: #fff; 
            border: 1px solid #00acc1;
        }

        .btn-login:hover { background: #00acc1; color: #003344; }

        .btn-regis { 
            background: linear-gradient(45deg, #ff8800, #ffbb00);
            color: #003344; 
            border: none;
            box-shadow: 0 10px 20px rgba(255, 136, 0, 0.3);
        }

        .btn-regis:hover { 
            transform: scale(1.05); 
            box-shadow: 0 15px 30px rgba(255, 136, 0, 0.5);
        }

        @media (max-width: 600px) {
            h1 { font-size: 36px; }
            .btn-group { flex-direction: column; }
            .stats { gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo-container">
            <img src="https://i.ibb.co.com/KzQVqvb8/IMG-20260423-WA0008.jpg" alt="Rooxpedia Logo" class="logo-img">
        </div>
        
        <h1>ROOXPEDIA</h1>
        <div class="typing-text" id="typewriter"></div>
        
        <div class="features">
            <div class="feature-item">
                <i class="fas fa-bolt"></i>
                <h3>Instant OTP</h3>
                <p>Proses cepat tanpa delay panjang.</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-shield-alt"></i>
                <h3>Keamanan</h3>
                <p>Data akun aman & privasi terjaga.</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-tags"></i>
                <h3>Harga Termurah</h3>
                <p>Bersaing untuk reseller & pengguna.</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h4>50k+</h4>
                <p>Transaksi</p>
            </div>
            <div class="stat-box">
                <h4>10k+</h4>
                <p>Pengguna</p>
            </div>
            <div class="stat-box">
                <h4>24/7</h4>
                <p>Support</p>
            </div>
        </div>

        <div class="btn-group">
            <a href="utama/regis.html" class="btn btn-regis">
                <i class="fas fa-user-plus"></i> Mulai Sekarang
            </a>
            <a href="utama/login.html" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Masuk Akun
            </a>
        </div>
    </div>

    <script>
        const text = "Solusi Nokos Terbaik & Terpercaya di Indonesia";
        let i = 0;
        const speed = 100;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
